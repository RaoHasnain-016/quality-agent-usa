<div class="page-card">
  <h2>Settings</h2>
  <p *ngIf="error" class="error">{{ error }}</p>
  <p *ngIf="message" class="message">{{ message }}</p>

  <form (ngSubmit)="saveSettings()">
    <label>
      Company name
      <input type="text" [(ngModel)]="form.company" name="company" />
    </label>

    <label>
      Alert email
      <input type="email" [(ngModel)]="form.alertEmail" name="alertEmail" />
    </label>

    <label>
      Alert threshold
      <input type="number" [(ngModel)]="form.alertThreshold" name="alertThreshold" min="0" max="100" />
    </label>

    <label>
      Company policy
      <textarea [(ngModel)]="form.companyPolicy" name="companyPolicy" rows="5"></textarea>
    </label>

    <button type="submit">Save settings</button>
  </form>
</div>
